<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Rectangle - Spring & Euler Toggle</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            flex-direction: column;
        }
        canvas {
            border: 1px solid #000;
            margin-bottom: 20px;
        }
        .controls {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .control-group {
            margin: 10px 0;
        }
        label {
            font-family: monospace;
            font-size: 14px;
            margin-right: 10px;
        }
        input[type="range"] {
            width: 250px;
            vertical-align: middle;
        }
        .value-display {
            font-family: monospace;
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }
        button {
            background-color: #1ac8ba;
            border: none;
            color: white;
            padding: 6px 15px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button.euler-active {
            background-color: #fe8c09;
            box-shadow: 0 0 0 2px #ffcc80;
        }
        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .info {
            font-family: monospace;
            font-size: 12px;
            margin-top: 5px;
            color: #555;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas" width="800" height="200"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label>🔧 Spring (жесткость):</label>
            <input type="range" id="springSlider" min="0" max="0.1" step="0.001" value="0.05">
            <span id="springValue" class="value-display">0.050</span>
        </div>
        <div class="control-group">
            <button id="eulerToggleBtn">🔘 Режим: MIDPOINT</button>
        </div>
    </div>

    <script>
        // Get the canvas element by its ID
        const canvas = document.getElementById('myCanvas');
        // Get the 2D rendering context for the canvas
        const ctx = canvas.getContext('2d');

        // Generate n random numbers in (min, max)
        function rands(min, max, n) {
            const array = [];
            for (let i = 0; i < n; i++) {
                const randomNumber = min + Math.random() * (max - min);
                array.push(randomNumber);
            }
            return array;
        }

        //// PARTICLES ////
        let colors = ["#0ed21c", "#1ac8ba", "#13bdfe", "#a1a3fd", "#fc64fe", "#fd8581", "#fe8c09", "#ccac0d"];
        // The number of particles
        let nParticles = 1;
        // the timestep
        let dt = 0.1;
        // the particle start positions
        let startxs = rands(canvas.width/2, canvas.width/2, nParticles);
        let startys = rands(canvas.height/2, canvas.height/2, nParticles);
        // the particle positions
        let xs = structuredClone(startxs);
        let ys = structuredClone(startys);
        // the particle velocities; note that the visible speed is v * dt
        let vxs = rands(-40, 40, nParticles);
        let vys = rands(-20, 20, nParticles);
        
        // spring power (initial value = 0.05)
        let spring = 0.05;
        // energy value
        let e;
        // euler/midpoint method (false = midpoint, true = euler)
        let euler = false;
        
        // ----- UI Elements -----
        const springSlider = document.getElementById('springSlider');
        const springValueSpan = document.getElementById('springValue');
        const eulerBtn = document.getElementById('eulerToggleBtn');
        
        // Обновляем spring при изменении слайдера
        springSlider.addEventListener('input', function() {
            spring = parseFloat(this.value);
            springValueSpan.textContent = spring.toFixed(3);
        });
        
        // Переключение метода Эйлера / Midpoint
        eulerBtn.addEventListener('click', function() {
            euler = !euler;
            if (euler) {
                eulerBtn.textContent = '⚡ Режим: EULER';
                eulerBtn.classList.add('euler-active');
            } else {
                eulerBtn.textContent = '🔘 Режим: MIDPOINT';
                eulerBtn.classList.remove('euler-active');
            }
        });
        
        // Update the position of particles
        function update() {
            for (let i = 0; i < nParticles; i++) {
                if(euler){
                  // Euler method
                  xs[i] += vxs[i] * dt;
                  ys[i] += vys[i] * dt;
                  //vxs[i] -= spring * (xs[i] - startxs[i]) * dt;
                  //vys[i] -= spring * (ys[i] - startys[i]) * dt;
				  vxs[i] -= spring * (xs[i] - canvas.width/2) * dt;
                  vys[i] -= spring * (ys[i] - canvas.height/2) * dt;
                }
                else{
                  // Midpoint method
                  vxs[i] -= spring * (xs[i] - canvas.width/2) * dt / 2;
                  vys[i] -= spring * (ys[i] - canvas.height/2) * dt / 2;
                  xs[i] += vxs[i] * dt;
                  ys[i] += vys[i] * dt;
                  vxs[i] -= spring * (xs[i] - canvas.width/2) * dt / 2;
                  vys[i] -= spring * (ys[i] - canvas.height/2) * dt / 2;
                }
                // Check for collision with the canvas boundaries
                if (xs[i] <= 0) {
                    vxs[i] = Math.abs(vxs[i]);
                }
                if (xs[i] >= canvas.width) {
                    vxs[i] = -Math.abs(vxs[i]);
                }
                if (ys[i] <= 0) {
                    vys[i] = Math.abs(vys[i]);
                }
                if (ys[i] >= canvas.height) {
                    vys[i] = -Math.abs(vys[i]);
                }
            }
        }
        
        // Energy value for the current system; should be constant (more constant with midpoint)
        function energy(){
          e = 0;
          for (let i = 0; i < nParticles; i++) {
              e += (vxs[i] * vxs[i] + vys[i] * vys[i]);
              e += spring * ((xs[i] - startxs[i]) * (xs[i] - startxs[i]) + (ys[i] - startys[i]) * (ys[i] - startys[i]));
          }
          e /= 2;
          e = e.toFixed(3);
        }
        
        // Draw circles at the particle positions
        function drawParticles() {
            for (let i = 0; i < nParticles; i++) {
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.arc(xs[i], ys[i], 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
            }
            ctx.font = "20px monospace";
            ctx.fillStyle = "#222";
            ctx.fillText("Energy: " + e, 10, 40);
            
            ctx.font = "14px monospace";
            ctx.fillStyle = "#555";
            ctx.fillText("Spring: " + spring.toFixed(4), 10, 70);
            ctx.fillText("Method: " + (euler ? "EULER" : "MIDPOINT"), 10, 90);
        }

        // Animate the particles
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            update();
            energy();
            drawParticles();
            requestAnimationFrame(animate);
        }

        // Start the animation
        animate();
    </script>
</body>
</html>
